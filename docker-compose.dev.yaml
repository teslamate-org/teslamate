services:
  teslamate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    restart: unless-stopped
    environment:
      - ENCRYPTION_KEY=MQwgm91uuWkoUYkt6+lwRKf2wiFmpED326+NVwlaI4Y=
      # Neon PostgreSQL configuration - UPDATE THESE VALUES with your Neon credentials
      - DATABASE_USER=YOUR_NEON_USER
      - DATABASE_PASS=YOUR_NEON_PASSWORD
      - DATABASE_NAME=YOUR_NEON_DATABASE
      - DATABASE_HOST=YOUR_NEON_HOST.neon.tech
      - DATABASE_PORT=5432
      - DATABASE_SSL=noverify
      - DATABASE_SSL_SNI=YOUR_NEON_HOST.neon.tech
      - MQTT_HOST=mosquitto
      - MIX_ENV=dev
      - PORT=4000
    ports:
      - 4000:4000
    volumes:
      # Mount source code for hot reloading
      - .:/opt/app
      # Mount import directory
      - ./import:/opt/app/import
      # Cache dependencies and build artifacts
      - _build:/opt/app/_build
      - deps:/opt/app/deps
      - node_modules:/opt/app/assets/node_modules
    cap_drop:
      - all
    # Override the default command to run in development mode
    command: ["mix", "phx.server"]
    # Removed depends_on: database since we're using Neon now

  # Local database service - commented out since we're using Neon
  # database:
  #   image: postgres:17-trixie
  #   restart: unless-stopped
  #   environment:
  #     - POSTGRES_USER=teslamate
  #     - POSTGRES_PASSWORD=J_\+8ot264M2
  #     - POSTGRES_DB=teslamate
  #   volumes:
  #     - teslamate-db:/var/lib/postgresql/data
  #   ports:
  #     - 5432:5432 # Expose for local development

  grafana:
    image: teslamate/grafana:latest
    restart: unless-stopped
    environment:
      # Neon PostgreSQL configuration - UPDATE THESE VALUES with your Neon credentials
      - DATABASE_USER=YOUR_NEON_USER
      - DATABASE_PASS=YOUR_NEON_PASSWORD
      - DATABASE_NAME=YOUR_NEON_DATABASE
      - DATABASE_HOST=YOUR_NEON_HOST.neon.tech
      - DATABASE_PORT=5432
      - DATABASE_SSL_MODE=require
    ports:
      - 3000:3000
    volumes:
      - teslamate-grafana-data:/var/lib/grafana

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    command: mosquitto -c /mosquitto-no-auth.conf
    ports:
      - 1883:1883 # Expose MQTT for development
    volumes:
      - mosquitto-conf:/mosquitto/config
      - mosquitto-data:/mosquitto/data

# Development-specific volumes for caching
volumes:
  _build:
  deps:
  node_modules:
  # teslamate-db:  # Commented out since we're using Neon
  teslamate-grafana-data:
  mosquitto-conf:
  mosquitto-data:
